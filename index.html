<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Tactiekbord | SV Overvecht De Dreef</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gras: #2e7d32;
            --lijn: rgba(255,255,255,0.8);
            --dreef-blauw: #0d061a;
            --dreef-rood: #cc0000;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background: #1a1a1a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* ZIJBALK */
        .sidebar { width: 300px; background: #222; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 2px solid #444; }
        h2 { font-weight: 800; font-size: 1.2rem; color: #fff; text-transform: uppercase; }
        .btn { background: var(--dreef-rood); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; width: 100%; transition: 0.2s; }
        .btn:hover { background: #ff1a1a; }
        .btn-secondary { background: #444; }
        .btn-secondary:hover { background: #555; }
        select, input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; }
        
        /* HET VELD */
        .field-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .field { width: 100%; height: 100%; max-width: 900px; max-height: 600px; background: var(--gras); border: 4px solid var(--lijn); position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* BELIJNING */
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--lijn); }
        .center-circle { position: absolute; left: 50%; top: 50%; width: 120px; height: 120px; border: 2px solid var(--lijn); border-radius: 50%; transform: translate(-50%, -50%); }
        .penalty-area-left { position: absolute; left: 0; top: 25%; width: 15%; height: 50%; border: 2px solid var(--lijn); border-left: none; }
        .penalty-area-right { position: absolute; right: 0; top: 25%; width: 15%; height: 50%; border: 2px solid var(--lijn); border-right: none; }
        
        /* SPELERS */
        .player { width: 35px; height: 35px; border-radius: 50%; position: absolute; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 0.8rem; cursor: move; user-select: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white; color: white; }
        .team-a { background: var(--dreef-rood); }
        .team-b { background: #0055ff; }
        .player-label { position: absolute; bottom: -18px; font-size: 0.65rem; white-space: nowrap; background: rgba(0,0,0,0.7); padding: 1px 5px; border-radius: 3px; font-weight: 400; }
        
        /* CANVAS VOOR LIJNEN */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📋 Tactiekbord</h2>
        <p style="font-size: 0.8rem; color: #aaa;">Sleep de spelers over het veld.</p>
        
        <hr style="border-color: #444;">
        
        <h2>💾 Opslaan</h2>
        <input type="text" id="tactic-name" placeholder="Naam van tactiek...">
        <button class="btn" onclick="saveTactic()">Sla Frame Op</button>
        
        <hr style="border-color: #444;">
        
        <h2>⏱️ Replay</h2>
        <select id="saved-tactics" onchange="loadTactic()">
            <option value="">-- Kies een tactiek --</option>
        </select>
        <div style="display: flex; gap: 5px;">
            <button class="btn btn-secondary" onclick="playReplay()">▶ Play</button>
            <button class="btn btn-secondary" style="background:#a00;" onclick="clearTactics()">🗑️ Wis alles</button>
        </div>
        
        <hr style="border-color: #444;">
        
        <h2>✏️ Edit Speler</h2>
        <p style="font-size: 0.75rem; color: #aaa;">Klik eerst op een speler op het veld.</p>
        <input type="text" id="edit-name" placeholder="Naam">
        <input type="text" id="edit-num" placeholder="Nummer" style="margin-top: 5px;">
        <button class="btn btn-secondary" style="margin-top: 5px;" onclick="updatePlayer()">Update Speler</button>
    </div>

    <div class="field-container">
        <div class="field" id="field">
            <div class="center-line"></div>
            <div class="center-circle"></div>
            <div class="penalty-area-left"></div>
            <div class="penalty-area-right"></div>
            <canvas id="canvas"></canvas>
            
            <div class="player team-a" id="p1" style="top: 45%; left: 5%;" onclick="selectPlayer('p1')">1<div class="player-label">KIEPER</div></div>
            <div class="player team-a" id="p2" style="top: 20%; left: 25%;" onclick="selectPlayer('p1')">4<div class="player-label">VERDEDIGER</div></div>
            <div class="player team-a" id="p3" style="top: 70%; left: 25%;" onclick="selectPlayer('p1')">3<div class="player-label">VERDEDIGER</div></div>
            <div class="player team-a" id="p4" style="top: 45%; left: 45%;" onclick="selectPlayer('p1')">10<div class="player-label">MIDDENVELD</div></div>
            <div class="player team-a" id="p5" style="top: 45%; left: 70%;" onclick="selectPlayer('p1')">9<div class="player-label">SPITS</div></div>
            
            <div class="player team-b" id="p6" style="top: 45%; left: 90%;" onclick="selectPlayer('p1')">1<div class="player-label">KIEPER</div></div>
            <div class="player team-b" id="p7" style="top: 30%; left: 75%;" onclick="selectPlayer('p1')">2<div class="player-label">VERDEDIGER</div></div>
            <div class="player team-b" id="p8" style="top: 60%; left: 75%;" onclick="selectPlayer('p1')">5<div class="player-label">VERDEDIGER</div></div>
        </div>
    </div>

    <script>
        let selectedPlayerId = null;
        let tacticsData = JSON.parse(localStorage.getItem('coach_tactics')) || {};

        // Canvas setup voor eventuele toekomstige teken-functies
        const canvas = document.getElementById('canvas');
        const field = document.getElementById('field');
        function resizeCanvas() {
            canvas.width = field.clientWidth;
            canvas.height = field.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // SLEPEN VAN SPELERS
        const players = document.querySelectorAll('.player');
        players.forEach(player => {
            player.addEventListener('mousedown', function(e) {
                let shiftX = e.clientX - player.getBoundingClientRect().left;
                let shiftY = e.clientY - player.getBoundingClientRect().top;

                function moveAt(pageX, pageY) {
                    let fieldRect = field.getBoundingClientRect();
                    let x = pageX - fieldRect.left - shiftX;
                    let y = pageY - fieldRect.top - shiftY;

                    // Binnen het veld houden
                    x = Math.max(0, Math.min(x, fieldRect.width - player.clientWidth));
                    y = Math.max(0, Math.min(y, fieldRect.height - player.clientHeight));

                    player.style.left = (x / fieldRect.width) * 100 + '%';
                    player.style.top = (y / fieldRect.height) * 100 + '%';
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            });

            player.ondragstart = function() { return false; };
        });

        // SPELER SELECTEREN EN EDITEN
        function selectPlayer(id) {
            // Vind de geklikte player
            const clickedPlayer = event.currentTarget;
            selectedPlayerId = clickedPlayer.id;
            
            players.forEach(p => p.style.borderColor = 'white');
            clickedPlayer.style.borderColor = 'yellow';
            
            document.getElementById('edit-name').value = clickedPlayer.querySelector('.player-label').innerText;
            document.getElementById('edit-num').value = clickedPlayer.childNodes[0].textContent;
        }

        function updatePlayer() {
            if (!selectedPlayerId) return alert('Klik eerst op een speler op het veld!');
            const player = document.getElementById(selectedPlayerId);
            const newName = document.getElementById('edit-name').value;
            const newNum = document.getElementById('edit-num').value;
            
            player.childNodes[0].textContent = newNum;
            player.querySelector('.player-label').innerText = newName.toUpperCase();
        }

        // TACTIEKEN OPSLAAN EN LADEN
        function updateSelectDropdown() {
            const select = document.getElementById('saved-tactics');
            select.innerHTML = '<option value="">-- Kies een tactiek --</option>';
            for (let name in tacticsData) {
                const option = document.createElement('option');
                option.value = name;
                option.innerText = name;
                select.appendChild(option);
            }
        }
        updateSelectDropdown();

        function saveTactic() {
            const nameInput = document.getElementById('tactic-name').value;
            if (!nameInput) return alert('Geef de tactiek eerst een naam!');
            
            let currentPositions = {};
            players.forEach(player => {
                currentPositions[player.id] = {
                    top: player.style.top,
                    left: player.style.left,
                    num: player.childNodes[0].textContent,
                    name: player.querySelector('.player-label').innerText
                };
            });

            if(!tacticsData[nameInput]) tacticsData[nameInput] = [];
            tacticsData[nameInput].push(currentPositions); // Voeg frame toe
            
            localStorage.setItem('coach_tactics', JSON.stringify(tacticsData));
            updateSelectDropdown();
            alert('Frame opgeslagen binnen tactiek: ' + nameInput);
        }

        function loadTactic() {
            const selected = document.getElementById('saved-tactics').value;
            if (!selected || !tacticsData[selected]) return;
            
            // Laad het EERSTE frame van die tactiek
            applyFrame(tacticsData[selected][0]);
        }

        function applyFrame(frame) {
            for (let id in frame) {
                const p = document.getElementById(id);
                if (p) {
                    p.style.top = frame[id].top;
                    p.style.left = frame[id].left;
                    p.childNodes[0].textContent = frame[id].num;
                    p.querySelector('.player-label').innerText = frame[id].name;
                }
            }
        }

        function playReplay() {
            const selected = document.getElementById('saved-tactics').value;
            if (!selected || !tacticsData[selected]) return alert('Selecteer eerst een tactiek.');
            
            const frames = tacticsData[selected];
            let currentFrame = 0;
            
            const interval = setInterval(() => {
                applyFrame(frames[currentFrame]);
                currentFrame++;
                if (currentFrame >= frames.length) {
                    clearInterval(interval);
                }
            }, 1000); // Speelt af met 1 seconde per frame
        }

        function clearTactics() {
            if(confirm('Weet je zeker dat je alle tactieken wilt wissen?')) {
                localStorage.removeItem('coach_tactics');
                tacticsData = {};
                updateSelectDropdown();
            }
        }
    </script>
</body>
</html>
