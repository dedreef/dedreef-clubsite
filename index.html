<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV OVERVECHT | Club Teams</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dreef-blauw: #0d061a;
            --dreef-rood: #cc0000;
            --achtergrond: #f0f2f5;
            --sidebar-breedte: 280px;
            --wit: #ffffff;
            --trans-wit: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        body { font-family: 'Poppins', sans-serif; background: var(--achtergrond); margin: 0; display: flex; min-height: 100vh; color: var(--dreef-blauw); }

        /* SIDEBAR UPGRADE */
        .sidebar {
            width: var(--sidebar-breedte);
            background: linear-gradient(180deg, var(--dreef-rood) 0%, #a00000 100%);
            color: white;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            border-right: 5px solid var(--dreef-blauw);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        .sidebar-header { padding: 30px 20px; text-align: center; background: rgba(0,0,0,0.1); margin-bottom: 10px; }
        .sidebar-logo { width: 90px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
        .sidebar-title { font-family: 'Oswald', sans-serif; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }

        /* HOME KNOP MODERN */
        .home-btn {
            width: 90%; margin: 10px auto; background: var(--wit); color: var(--dreef-blauw);
            padding: 12px 20px; border: none; border-radius: 12px;
            text-align: left; font-family: 'Oswald', sans-serif; text-transform: uppercase;
            cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; gap: 12px;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .home-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); background: var(--dreef-blauw); color: white; }

        /* CATEGORIEËN EN DROPDOWNS */
        .sidebar-item { margin-bottom: 2px; }
        .category-btn {
            width: 100%; background: transparent; color: white;
            padding: 15px 25px; border: none; text-align: left;
            font-family: 'Oswald', sans-serif; text-transform: uppercase;
            cursor: pointer; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--trans-wit);
            transition: background 0.2s;
        }
        .category-btn:hover { background: var(--trans-wit); }

        .team-group {
            display: none; background: rgba(0,0,0,0.2); padding: 12px;
            flex-wrap: wrap; gap: 8px; animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-item:hover .team-group { display: flex; }

        .team-button {
            flex: 1 1 calc(50% - 8px); background: rgba(255,255,255,0.05); color: white;
            border: 1px solid var(--trans-wit); padding: 10px 5px;
            font-family: 'Oswald', sans-serif; font-size: 0.85rem;
            text-transform: uppercase; border-radius: 8px; cursor: pointer;
            transition: all 0.2s;
        }
        .team-button:hover, .team-button.active { background: var(--wit); color: var(--dreef-blauw); font-weight: 700; transform: scale(1.03); }

        /* MAIN CONTENT DESIGN */
        .main-content { margin-left: var(--sidebar-breedte); flex: 1; padding: 50px; }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; }
        
        h1#active-team-name { 
            font-family: 'Oswald', sans-serif; color: var(--dreef-blauw); 
            text-transform: uppercase; border-left: 8px solid var(--dreef-rood); 
            padding-left: 20px; margin-bottom: 40px; font-size: 4rem;
            line-height: 1; letter-spacing: -1px;
        }
        
        .card { 
            background: white; border-radius: 24px; overflow: hidden; 
            box-shadow: var(--shadow); margin-bottom: 35px; border: 1px solid rgba(0,0,0,0.03);
        }
        .card-header { 
            background: var(--dreef-blauw); color: white; padding: 18px 25px; 
            font-family: 'Oswald', sans-serif; text-align: left; 
            text-transform: uppercase; font-size: 1.2rem; letter-spacing: 1px;
            border-bottom: 4px solid var(--dreef-rood);
        }
        .mededeling-box { padding: 35px; line-height: 1.8; font-size: 1.15rem; color: #444; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { position: relative; width: 100%; height: auto; border-right: none; border-bottom: 5px solid var(--dreef-blauw); }
            .main-content { margin-left: 0; padding: 25px; }
            h1#active-team-name { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo" class="sidebar-logo">
            <div class="sidebar-title">SV OVERVECHT</div>
        </div>

        <button class="home-btn" onclick="gaNaarHome()">🏠 HOME</button>

        <div class="sidebar-item">
            <button class="category-btn">Mannen Zaterdag <span>+</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">Mannen 1</button>
            </div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Onder 14 <span>+</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">JO14-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO14-2</button>
                <button class="team-button" onclick="laadTeam(this)">JO14-3</button>
            </div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Onder 11 <span>+</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">JO11-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO11-2</button>
                <button class="team-button" onclick="laadTeam(this)">JO11-3</button>
            </div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Onder 10 t/m 7 <span>+</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">JO10-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO9-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO9-2</button>
                <button class="team-button" onclick="laadTeam(this)">JO9-3</button>
                <button class="team-button" onclick="laadTeam(this)">JO8-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO8-2</button>
                <button class="team-button" onclick="laadTeam(this)">JO8-3</button>
                <button class="team-button" onclick="laadTeam(this)">JO7-1</button>
            </div>
        </div>

    </nav>

    <main class="main-content">
        <div class="container">
            <h1 id="active-team-name">SV OVERVECHT</h1>
            
            <div class="card">
                <div class="card-header">Laatste Update</div>
                <div id="mededeling-box" class="mededeling-box">
                    Welkom op het nieuwe digitale hart van SV Overvecht De Dreef. Selecteer een team voor live updates en mededelingen.
                </div>
            </div>
        </div>
    </main>

    <script>
        function gaNaarHome() {
            document.querySelectorAll('.team-button').forEach(b => b.classList.remove('active'));
            document.getElementById('active-team-name').innerText = "SV OVERVECHT";
            document.getElementById('mededeling-box').innerHTML = "Welkom op de officiële website van SV Overvecht De Dreef. Kies een team voor de laatste standen en mededelingen.";
        }

        function laadTeam(buttonElement) {
            const teamNaam = buttonElement.innerText;
            document.querySelectorAll('.team-button').forEach(b => b.classList.remove('active'));
            buttonElement.classList.add('active');
            document.getElementById('active-team-name').innerText = teamNaam;
            document.getElementById('mededeling-box').innerHTML = "Hier komt straks de automatische data voor <strong>" + teamNaam + "</strong>.";
        }

        window.onload = gaNaarHome;
    </script>
</body>
</html>
